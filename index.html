<!DOCTYPE html>
<html>
<head>
  <title>Full Size Image</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* removes scrollbars */
      width: 100%;
      height: 100%;
      background: black;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain; /* keeps full image visible */
      display: block;
    }
  </style>
</head>
<body>

  <img src="ig.png" alt="Image">

</body>
</html>
